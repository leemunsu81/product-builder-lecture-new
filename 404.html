<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 — 오늘의 선택</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ef4444 50%, #ec4899 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; color: #1f2937; margin-bottom: 0.5rem; }
        p { color: #6b7280; margin-bottom: 2rem; line-height: 1.6; }
        .links { display: flex; flex-direction: column; gap: 0.75rem; }
        a {
            display: block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: #fff;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🍽️</div>
        <h1>페이지를 찾을 수 없습니다</h1>
        <p>요청하신 페이지가 없거나 이동되었습니다.<br>아래 링크에서 원하시는 내용을 찾아보세요.</p>
        <div class="links">
            <a href="/" class="btn-primary">🎲 저녁 메뉴 추천받기</a>
            <a href="/rps" class="btn-secondary">✊ 얼굴 가위바위보 테스트</a>
            <a href="/about" class="btn-secondary">서비스 소개</a>
            <a href="/contact" class="btn-secondary">문의하기</a>
        </div>
    </div>
</body>
</html>
