<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <style>
        :root {
            color-scheme: light;
            --page-bg: #f0f2f5;
            --panel-bg: #ffffff;
            --text: #222222;
            --muted: #5f6673;
            --number-bg: #4CAF50;
            --number-text: #ffffff;
            --button-bg: #007bff;
            --button-hover: #0056b3;
            --toggle-bg: #eef2f7;
            --toggle-text: #1f2937;
            --shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            color-scheme: dark;
            --page-bg: #111827;
            --panel-bg: #1f2937;
            --text: #f9fafb;
            --muted: #cbd5e1;
            --number-bg: #22c55e;
            --number-text: #052e16;
            --button-bg: #38bdf8;
            --button-hover: #0ea5e9;
            --toggle-bg: #374151;
            --toggle-text: #f9fafb;
            --shadow: 0 12px 30px rgba(0,0,0,0.35);
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--page-bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            position: relative;
            width: min(100% - 32px, 520px);
            text-align: center;
            background-color: var(--panel-bg);
            padding: 56px 40px 40px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        h1 {
            color: var(--text);
            margin: 0 0 16px;
        }

        p {
            color: var(--muted);
            margin: 0;
        }

        .lotto-numbers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 30px 0;
        }

        .number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--number-bg);
            color: var(--number-text);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: var(--button-bg);
            color: #ffffff;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        button:active {
            transform: translateY(1px);
        }

        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            min-width: 92px;
            padding: 8px 12px;
            background-color: var(--toggle-bg);
            color: var(--toggle-text);
            font-size: 14px;
        }

        .theme-toggle:hover {
            background-color: var(--toggle-bg);
        }

        @media (max-width: 480px) {
            .container {
                padding: 56px 20px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="다크 모드로 변경">다크 모드</button>
        <h1>로또 번호 추첨기</h1>
        <p>버튼을 눌러 행운의 번호를 받아보세요!</p>
        <div class="lotto-numbers" id="lotto-numbers">
            <div class="number">?</div>
            <div class="number">?</div>
            <div class="number">?</div>
            <div class="number">?</div>
            <div class="number">?</div>
            <div class="number">?</div>
        </div>
        <button type="button" onclick="generateNumbers()">번호 생성</button>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        function setTheme(theme) {
            const isDark = theme === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            themeToggle.textContent = isDark ? '화이트 모드' : '다크 모드';
            themeToggle.setAttribute('aria-label', isDark ? '화이트 모드로 변경' : '다크 모드로 변경');
            localStorage.setItem('theme', theme);
        }

        setTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

        themeToggle.addEventListener('click', () => {
            setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');
        });

        function generateNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const randomNumber = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(randomNumber)) {
                    numbers.push(randomNumber);
                }
            }
            numbers.sort((a, b) => a - b);

            const numberDivs = document.querySelectorAll('.number');
            numberDivs.forEach((div, index) => {
                div.textContent = numbers[index];
            });
        }
    </script>
</body>
</html>
