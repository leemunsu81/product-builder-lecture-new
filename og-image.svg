<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">오늘의 선택 - 저녁 메뉴 추천기</title>
  <desc id="desc">저녁 메뉴 추천과 AI 얼굴 인상 분석을 제공하는 오늘의 선택 사이트 미리보기 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="0.52" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#7f1d1d" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="105" r="130" fill="#ffffff" opacity="0.14"/>
  <circle cx="140" cy="530" r="180" fill="#ffffff" opacity="0.1"/>
  <rect x="95" y="86" width="1010" height="458" rx="36" fill="#fff7ed" filter="url(#shadow)"/>
  <text x="150" y="190" font-family="Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif" font-size="42" font-weight="800" fill="#ef4444">오늘의 선택</text>
  <text x="150" y="282" font-family="Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif" font-size="72" font-weight="900" fill="#1f2937">오늘 저녁 뭐 먹지?</text>
  <text x="150" y="355" font-family="Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="700" fill="#6b7280">한식 · 중식 · 일식 · 양식 · 분식 · 치킨피자</text>
  <text x="150" y="424" font-family="Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif" font-size="30" font-weight="700" fill="#9a3412">혼밥, 배달, 외식 상황에 맞춰 1초 만에 추천</text>
  <text x="850" y="300" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="150">🍽️</text>
  <text x="800" y="430" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="96">🍜 🍕 🍗</text>
</svg>
